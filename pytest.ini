[pytest]
# Place this at your project root (next to the app/ package), or merge these
# lines into an existing pytest.ini / pyproject.toml [tool.pytest.ini_options].
markers =
    semantic: requires the OpenAI embedding service (cheap; auto-skips offline)
    llm: requires Anthropic; opt-in via RUN_LLM_TESTS=1
addopts = -ra
testpaths = tests
